[build]
  command = "npm run build"
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."*"]
  included_files = ["node_modules/**"]

[[redirects]]
  from = "/api/auth/*"
  to = "/.netlify/functions/auth-:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/comments/*"
  to = "/.netlify/functions/comments-:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/messages/*"
  to = "/.netlify/functions/messages-:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/export/*"
  to = "/.netlify/functions/export-:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/backgrounds/*"
  to = "/.netlify/functions/backgrounds-:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/user/*"
  to = "/.netlify/functions/user-:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
