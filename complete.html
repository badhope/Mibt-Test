<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>完整MBTI测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        #test-page, #result-page, #control-panel-page {
            display: none;
        }
    </style>
</head>
<body>
    <h1>人格星球探索</h1>
    
    <!-- 首页 -->
    <div id="home-page">
        <button onclick="startTest('quick')">开始探索</button>
        <button onclick="startTest('standard')">深入探索</button>
        <button onclick="startTest('expert')">专业测评</button>
        <button onclick="openControlPanel()">控制面板</button>
    </div>
    
    <!-- 测试页面 -->
    <div id="test-page">
        <h2>测试页面</h2>
        <p>这里是测试内容</p>
        <button onclick="backToHome()">返回首页</button>
    </div>
    
    <!-- 结果页面 -->
    <div id="result-page">
        <h2>结果页面</h2>
        <p>这里是测试结果</p>
        <button onclick="backToHome()">返回首页</button>
    </div>
    
    <!-- 控制面板页面 -->
    <div id="control-panel-page">
        <h2>控制面板</h2>
        <p>这里是控制面板</p>
        <button onclick="backToHome()">返回首页</button>
    </div>
    
    <script>
        console.log('完整MBTI测试页面加载成功');
        
        // 全局状态变量
        let currentTestMode = 'standard';
        let currentQuestionIndex = 0;
        let userAnswers = {};
        let dimensionScores = {};
        let miniTestUserAnswers = {};
        let currentMiniTestType = null;
        let currentMiniQuestionIndex = 0;
        
        // 初始化函数
        function init() {
            console.log('初始化函数执行');
            // 暴露函数到全局
            window.startTest = startTest;
            window.backToHome = backToHome;
            window.openControlPanel = openControlPanel;
            console.log('函数暴露完成');
        }
        
        // 开始测试
        function startTest(mode) {
            console.log('开始测试:', mode);
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('test-page').style.display = 'block';
        }
        
        // 返回首页
        function backToHome() {
            console.log('返回首页');
            document.getElementById('test-page').style.display = 'none';
            document.getElementById('result-page').style.display = 'none';
            document.getElementById('control-panel-page').style.display = 'none';
            document.getElementById('home-page').style.display = 'block';
        }
        
        // 打开控制面板
        function openControlPanel() {
            console.log('打开控制面板');
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('control-panel-page').style.display = 'block';
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            console.log('DOMContentLoaded事件触发');
            init();
            console.log('初始化完成');
        });
        
        console.log('JavaScript代码加载完成');
    </script>
</body>
</html>
