<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最小化测试</title>
</head>
<body>
    <h1>最小化测试</h1>
    <button onclick="testFunction()">测试按钮</button>
    
    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/core.js"></script>
    <script src="js/main.js"></script>
    
    <script>
        console.log('Minimal test page loaded');
        console.log('dimensions:', typeof dimensions);
        console.log('questions:', typeof questions);
        console.log('startTest:', typeof startTest);
        
        function testFunction() {
            console.log('Test button clicked');
            if (typeof startTest === 'function') {
                console.log('startTest is a function');
                startTest('quick');
            } else {
                console.log('startTest is not a function');
            }
        }
    </script>
