<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>独立测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        #test-page {
            display: none;
        }
    </style>
</head>
<body>
    <h1>独立测试</h1>
    
    <!-- 首页 -->
    <div id="home-page">
        <button onclick="startTest('quick')">开始探索</button>
        <button onclick="startTest('standard')">深入探索</button>
        <button onclick="startTest('expert')">专业测评</button>
    </div>
    
    <!-- 测试页面 -->
    <div id="test-page">
        <h2>测试页面</h2>
        <p>这里是测试内容</p>
        <button onclick="backToHome()">返回首页</button>
    </div>
    
    <script>
        // 全局状态变量
        let currentTestMode = 'standard';
        let currentQuestionIndex = 0;
        let userAnswers = {};
        let dimensionScores = {};
        
        // 开始测试
        function startTest(mode) {
            alert('开始测试: ' + mode);
            console.log('开始测试:', mode);
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('test-page').style.display = 'block';
        }
        
        // 返回首页
        function backToHome() {
            alert('返回首页');
            console.log('返回首页');
            document.getElementById('test-page').style.display = 'none';
            document.getElementById('home-page').style.display = 'block';
        }
        
        console.log('独立测试页面加载成功');
        console.log('startTest:', typeof startTest);
        console.log('backToHome:', typeof backToHome);
    </script>
</body>
</html>
